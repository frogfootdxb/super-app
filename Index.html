<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0e0e0e;
–surface: #161616;
–border: #2a2a2a;
–accent: #c8a96e;
–text: #e8e2d9;
–muted: #555;
–dim: #888;
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 60px 20px;
}

header {
text-align: center;
margin-bottom: 56px;
}

header h1 {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2rem, 5vw, 3.2rem);
font-weight: 400;
letter-spacing: -0.5px;
color: var(–text);
line-height: 1.1;
}

header h1 em {
color: var(–accent);
font-style: italic;
}

header p {
margin-top: 12px;
color: var(–dim);
font-size: 0.75rem;
letter-spacing: 0.12em;
text-transform: uppercase;
}

.container {
width: 100%;
max-width: 760px;
}

/* — INPUT PANEL — */
.input-panel {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
padding: 32px;
margin-bottom: 32px;
transition: border-color 0.2s;
}

.input-panel:focus-within {
border-color: var(–accent);
}

.input-panel label {
display: block;
font-size: 0.65rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 14px;
}

textarea {
width: 100%;
min-height: 140px;
background: transparent;
border: none;
color: var(–text);
font-family: ‘Playfair Display’, serif;
font-size: 1rem;
line-height: 1.7;
resize: vertical;
outline: none;
}

textarea::placeholder {
color: var(–muted);
font-style: italic;
}

.actions {
display: flex;
gap: 12px;
margin-top: 20px;
padding-top: 20px;
border-top: 1px solid var(–border);
}

button {
font-family: ‘DM Mono’, monospace;
font-size: 0.7rem;
letter-spacing: 0.14em;
text-transform: uppercase;
cursor: pointer;
border: none;
border-radius: 1px;
padding: 10px 22px;
transition: all 0.15s;
}

.btn-primary {
background: var(–accent);
color: #0e0e0e;
font-weight: 400;
}

.btn-primary:hover { background: #d9bc84; }

.btn-ghost {
background: transparent;
color: var(–dim);
border: 1px solid var(–border);
}

.btn-ghost:hover { border-color: var(–dim); color: var(–text); }

/* — READER PANEL — */
.reader-panel {
display: none;
}

.reader-panel.active {
display: block;
}

.progress-bar-wrap {
display: flex;
align-items: center;
gap: 14px;
margin-bottom: 28px;
}

.progress-bar {
flex: 1;
height: 2px;
background: var(–border);
border-radius: 2px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: var(–accent);
transition: width 0.4s ease;
border-radius: 2px;
}

.progress-label {
font-size: 0.65rem;
color: var(–dim);
letter-spacing: 0.1em;
white-space: nowrap;
min-width: 60px;
text-align: right;
}

.sentences-list {
display: flex;
flex-direction: column;
gap: 0;
}

.sentence-item {
position: relative;
padding: 22px 0;
border-bottom: 1px solid var(–border);
animation: slideIn 0.35s ease forwards;
opacity: 0;
}

@keyframes slideIn {
from { opacity: 0; transform: translateY(10px); }
to   { opacity: 1; transform: translateY(0); }
}

.sentence-item .sentence-text {
font-family: ‘Playfair Display’, serif;
font-size: 1.15rem;
line-height: 1.75;
color: var(–text);
display: block;
}

.sentence-item .sentence-num {
font-size: 0.6rem;
color: var(–muted);
letter-spacing: 0.1em;
margin-bottom: 8px;
display: block;
}

/* Last sentence has the click trigger */
.sentence-item.current {
cursor: pointer;
}

.sentence-item.current .sentence-text {
color: var(–accent);
}

.sentence-item.current::after {
content: ‘click for next →’;
display: block;
margin-top: 10px;
font-size: 0.62rem;
color: var(–muted);
letter-spacing: 0.12em;
text-transform: uppercase;
}

.sentence-item.done .sentence-text {
color: #444;
}

.sentence-item.done .sentence-num {
color: #2a2a2a;
}

/* Completion state */
.completion {
display: none;
text-align: center;
padding: 48px 0;
animation: slideIn 0.4s ease forwards;
opacity: 0;
}

.completion.show {
display: block;
}

.completion .icon {
font-size: 2rem;
margin-bottom: 16px;
display: block;
}

.completion h2 {
font-family: ‘Playfair Display’, serif;
font-size: 1.5rem;
font-weight: 400;
color: var(–accent);
margin-bottom: 8px;
}

.completion p {
color: var(–dim);
font-size: 0.72rem;
letter-spacing: 0.1em;
}

/* Keyboard hint */
.kbd-hint {
text-align: center;
margin-top: 28px;
font-size: 0.62rem;
color: var(–muted);
letter-spacing: 0.1em;
text-transform: uppercase;
}

kbd {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 3px;
padding: 1px 6px;
font-family: ‘DM Mono’, monospace;
font-size: 0.62rem;
color: var(–dim);
}
</style>

</head>
<body>

<header>
  <h1>Sentence <em>Reader</em></h1>
  <p>Reveal one sentence at a time</p>
</header>

<div class="container">

  <!-- INPUT -->

  <div class="input-panel" id="inputPanel">
    <label for="textInput">Paste your paragraph</label>
    <textarea id="textInput" placeholder="Paste any paragraph here and click Begin to read it sentence by sentence…"></textarea>
    <div class="actions">
      <button class="btn-primary" onclick="begin()">Begin Reading</button>
      <button class="btn-ghost" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- READER -->

  <div class="reader-panel" id="readerPanel">

```
<div class="progress-bar-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <span class="progress-label" id="progressLabel">0 / 0</span>
</div>

<div class="sentences-list" id="sentencesList"></div>

<div class="completion" id="completion">
  <span class="icon">✦</span>
  <h2>Complete</h2>
  <p>All sentences revealed</p>
  <div style="margin-top:24px;">
    <button class="btn-ghost" onclick="reset()">Start Again</button>
  </div>
</div>

<div class="kbd-hint" id="kbdHint">
  click current sentence &nbsp;·&nbsp; or press <kbd>Space</kbd> / <kbd>→</kbd>
</div>
```

  </div>

</div>

<script>
  let sentences = [];
  let revealed = 0;

  function splitSentences(text) {
    // Split on sentence-ending punctuation followed by space or end
    const raw = text.trim().match(/[^.!?]+[.!?]+[\s]*/g) || [text.trim()];
    return raw.map(s => s.trim()).filter(s => s.length > 0);
  }

  function begin() {
    const input = document.getElementById('textInput').value.trim();
    if (!input) return;

    sentences = splitSentences(input);
    revealed = 0;

    document.getElementById('sentencesList').innerHTML = '';
    document.getElementById('completion').classList.remove('show');
    document.getElementById('inputPanel').style.display = 'none';
    document.getElementById('readerPanel').classList.add('active');

    updateProgress();
    revealNext();
  }

  function revealNext() {
    if (revealed >= sentences.length) {
      document.getElementById('kbdHint').style.display = 'none';
      document.getElementById('completion').classList.add('show');
      return;
    }

    const list = document.getElementById('sentencesList');

    // De-activate previous current
    const prev = list.querySelector('.sentence-item.current');
    if (prev) {
      prev.classList.remove('current');
      prev.classList.add('done');
      prev.onclick = null;
    }

    // Add new sentence
    const item = document.createElement('div');
    item.className = 'sentence-item current';
    item.innerHTML = `
      <span class="sentence-num">${revealed + 1} of ${sentences.length}</span>
      <span class="sentence-text">${escHtml(sentences[revealed])}</span>
    `;
    item.onclick = () => {
      revealed++;
      updateProgress();
      revealNext();
    };
    list.appendChild(item);

    // Scroll into view
    setTimeout(() => item.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);

    revealed++;
    updateProgress();
  }

  // Correct: reveal increments after adding, so fix — reset counter properly
  function begin() {
    const input = document.getElementById('textInput').value.trim();
    if (!input) return;

    sentences = splitSentences(input);
    revealed = 0;

    document.getElementById('sentencesList').innerHTML = '';
    document.getElementById('completion').classList.remove('show');
    document.getElementById('kbdHint').style.display = '';
    document.getElementById('inputPanel').style.display = 'none';
    document.getElementById('readerPanel').classList.add('active');

    updateProgress();
    addSentence(0);
  }

  function addSentence(index) {
    if (index >= sentences.length) {
      // All done
      document.getElementById('kbdHint').style.display = 'none';
      document.getElementById('completion').classList.add('show');
      return;
    }

    const list = document.getElementById('sentencesList');

    // De-activate previous
    const prev = list.querySelector('.sentence-item.current');
    if (prev) {
      prev.classList.remove('current');
      prev.classList.add('done');
      prev.onclick = null;
    }

    const item = document.createElement('div');
    item.className = 'sentence-item current';
    item.innerHTML = `
      <span class="sentence-num">${index + 1} / ${sentences.length}</span>
      <span class="sentence-text">${escHtml(sentences[index])}</span>
    `;
    item.onclick = () => {
      revealed = index + 1;
      updateProgress();
      addSentence(revealed);
    };

    list.appendChild(item);
    setTimeout(() => item.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);

    revealed = index + 1;
    updateProgress();
  }

  function updateProgress() {
    const total = sentences.length;
    const pct = total ? Math.round((revealed / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${revealed} / ${total}`;
  }

  function reset() {
    document.getElementById('readerPanel').classList.remove('active');
    document.getElementById('inputPanel').style.display = '';
    sentences = [];
    revealed = 0;
  }

  function clearAll() {
    document.getElementById('textInput').value = '';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Keyboard: Space or Arrow Right
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowRight') {
      const current = document.querySelector('.sentence-item.current');
      if (current) {
        e.preventDefault();
        current.click();
      }
    }
  });
</script>

</body>
</html>
